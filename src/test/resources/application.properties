spring.application.name=active-campaign-integration

# ActiveCampaign API
activecampaign.api.url=https://youraccountname.api-us1.com/api/3
activecampaign.api.key=YOUR_API_KEY_HERE

# Schedulers
app.scheduler.timezone=Europe/Rome
app.scheduler.contact-sync.cron=10 * * * * *
app.scheduler.contact-sync.cron.active=true
app.scheduler.contact-bulk-import.cron=10 * * * * *
app.scheduler.contact-bulk-import.cron.active=false
